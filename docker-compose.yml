services:
  # 1. APP (PHP-FPM)
  app:
    build: .
    volumes:
      - .:/var/www/html                     # Source code bind mount
      - vendor_vol:/var/www/html/vendor      # Named volume (FAST! bypass Windows I/O)
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [motorent]

  # 2. NGINX (Web Server)
  nginx:
    image: nginx:alpine
    ports: ["8000:80"]
    volumes:
      - .:/var/www/html:ro                   # Read-only bind mount
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - vendor_vol:/var/www/html/vendor:ro   # Read-only named volume
    depends_on: [app]
    networks: [motorent]

  # 3. MYSQL 8
  mysql:
    image: mysql:8.0
    ports: ["33306:3306"]  # Diubah ke 33306 agar super aman dari port Laragon/XAMPP
    environment:
      MYSQL_DATABASE: sewa_motor_rpl
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_CHARACTER_SET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [motorent]

  # 4. REDIS (Cache + Session + Queue → pengganti database driver, opsional tapi sangat disarankan)
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [motorent]

  # 5. QUEUE WORKER
  queue:
    build: .
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - .:/var/www/html
      - vendor_vol:/var/www/html/vendor
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [motorent]

  # 6. MAILPIT (Email testing, optional)
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks: [motorent]

volumes:
  vendor_vol:         # PHP vendor di Linux FS → CEPAT (bypass Windows I/O)
  mysql_data:         # MySQL data persist
  redis_data:         # Redis data persist

networks:
  motorent:
    driver: bridge
